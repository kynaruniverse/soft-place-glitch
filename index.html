<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Maké · your command center</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#9ba59a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Maké">

  <!-- iOS Safari (partial PWA) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maké">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(r => console.log('[Maké SW] registered:', r.scope))
          .catch(e => console.warn('[Maké SW] failed:', e));
      });
    }
  </script>
</body>
</html>
