<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Soft Place to Glitch · 2035</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0A0A">
</head>
<body>
    <div id="app">
        <header>
            <button id="cmd-button" aria-label="Command palette">⌘</button>
            <div id="tab-bar"></div>
            <button id="smart-toggle" aria-label="Ambient intelligence">✨</button>
        </header>

        <main id="tab-content"></main>

        <div id="command-palette" class="hidden">
            <input type="text" id="command-input" placeholder="Type a command...">
            <div id="command-results"></div>
        </div>

        <div id="modal-overlay" class="hidden">
            <div id="modal">
                <h3 id="modal-title"></h3>
                <div id="modal-content"></div>
                <div class="modal-actions">
                    <button id="modal-cancel">Cancel</button>
                    <button id="modal-ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
